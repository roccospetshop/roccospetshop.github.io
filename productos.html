<!DOCTYPE html>
<html> 
<head> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Productos - Rocco's Pet Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:#f0f2f5; }

header { background:#498051; padding:30px; text-align:center; color:white; }

nav { background:#222; padding:12px; text-align:center; }

nav a { color:white; margin:0 15px; text-decoration:none; }

nav a:hover { color:#498051; }

/* 🛒 carrito */
.carrito-icono { position: relative; }

#contadorCarrito {
    position: absolute;
    top: -8px;
    right: -10px;
    background: red;
    color: white;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 50%;
}

/* 🧱 GRID CATÁLOGO */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* 📦 CARD */
.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* 🖼️ imagen */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    transition: 0.3s;
}

.card:hover img {
    transform: scale(1.05);
}

/* 📄 contenido */
.card-content {
    padding: 15px;
    text-align: center;
}

/* 💰 precio */
.price {
    font-weight: bold;
    margin: 10px 0;
}

/* botones */
.btn {
    background:#498051;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.btn:hover {
    background:#3b6b44;
}

/* ❤️ favoritos */
.fav-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
}

.fav-btn.activo {
    color: red;
}

/* 🔥 animación carrito */
@keyframes rebote {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    60% { transform: scale(0.9); }
    100% { transform: scale(1); }
}

.animar-carrito {
    animation: rebote 0.4s ease;
}

/* 🔔 toast */
#toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #498051;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(-20px);
    transition: 0.4s;
}

#toast.mostrar {
    opacity: 1;
    transform: translateY(0);
}

footer { background:#111; color:white; padding:15px; text-align:center; }
</style>
</head>

<body>

<header>
<h1>Rocco's Pet Shop</h1>
</header>

<nav>
<a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
<a href="productos.html"><i class="fa-solid fa-box"></i> Productos</a>
<a href="favoritos.html"><i class="fa-solid fa-heart"></i> Favoritos</a>
<a href="contacto.html"><i class="fa-solid fa-user"></i> Contacto</a>

<a href="carrito.html" class="carrito-icono">
<i class="fa-solid fa-cart-shopping"></i>
<span id="contadorCarrito">0</span>
</a>
</nav>

<div class="grid">

<!-- PRODUCTO -->
<div class="card">
<img src="https://placedog.net/400/300">
<div class="card-content">
<h3>Comida</h3>
<p class="price">$250 MXN</p>

<button class="btn" onclick="agregarCarrito('Comida',250)">Comprar</button>

<button class="fav-btn" onclick="toggleFavorito(this,'Comida',250)">
<i class="fa-solid fa-heart"></i>
</button>
</div>
</div>

<!-- PRODUCTO -->
<div class="card">
<img src="https://placedog.net/401/300">
<div class="card-content">
<h3>Juguetes</h3>
<p class="price">$120 MXN</p>

<button class="btn" onclick="agregarCarrito('Juguetes',120)">Comprar</button>

<button class="fav-btn" onclick="toggleFavorito(this,'Juguetes',120)">
<i class="fa-solid fa-heart"></i>
</button>
</div>
</div>

<!-- PRODUCTO -->
<div class="card">
<img src="https://placedog.net/402/300">
<div class="card-content">
<h3>Camas</h3>
<p class="price">$600 MXN</p>

<button class="btn" onclick="agregarCarrito('Camas',600)">Comprar</button>

<button class="fav-btn" onclick="toggleFavorito(this,'Camas',600)">
<i class="fa-solid fa-heart"></i>
</button>
</div>
</div>

</div>

<footer>© 2026 Rocco's Pet Shop</footer>

<div id="toast"></div>

<script>
function actualizarContador(){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
document.getElementById("contadorCarrito").textContent=carrito.length;
}

function mostrarToast(mensaje){
let toast=document.getElementById("toast");
toast.textContent=mensaje;
toast.classList.add("mostrar");

setTimeout(()=>{
toast.classList.remove("mostrar");
},2000);
}

function animarCarrito(){
let icono=document.querySelector(".carrito-icono");
if(icono){
icono.classList.add("animar-carrito");
setTimeout(()=>{icono.classList.remove("animar-carrito");},400);
}
}

function agregarCarrito(nombre,precio){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
carrito.push({nombre,precio});
localStorage.setItem("carrito",JSON.stringify(carrito));

actualizarContador();
mostrarToast(nombre+" agregado 🛒");
animarCarrito();
}

function toggleFavorito(boton,nombre,precio){
let favoritos=JSON.parse(localStorage.getItem("favoritos"))||[];
let index=favoritos.findIndex(p=>p.nombre===nombre);

if(index>-1){
favoritos.splice(index,1);
boton.classList.remove("activo");
}else{
favoritos.push({nombre,precio});
boton.classList.add("activo");
}

localStorage.setItem("favoritos",JSON.stringify(favoritos));
}

function cargarFavoritosVisual(){
let favoritos=JSON.parse(localStorage.getItem("favoritos"))||[];

document.querySelectorAll(".card").forEach(card=>{
let nombre=card.querySelector("h3").textContent;
let boton=card.querySelector(".fav-btn");

if(favoritos.some(p=>p.nombre===nombre)){
boton.classList.add("activo");
}
});
}

document.addEventListener("DOMContentLoaded",()=>{
actualizarContador();
cargarFavoritosVisual();
});
</script>

</body>
</html>
