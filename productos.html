<!DOCTYPE html>
<html> 
<head> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Productos - Rocco's Pet Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:#f0f2f5; }

header { background:#498051; padding:30px; text-align:center; color:white; }

nav { background:#222; padding:12px; text-align:center; }

nav a { color:white; margin:0 15px; text-decoration:none; }

nav a:hover { color:#498051; }

/* 🛒 carrito */
.carrito-icono { position: relative; }

#contadorCarrito {
    position: absolute;
    top: -8px;
    right: -10px;
    background: red;
    color: white;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 50%;
}

/* 🔗 quitar estilo link */
.card-link {
    text-decoration: none;
    color: inherit;
}

/* 🧱 grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* 📦 card */
.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
}

/* 🖼️ imagen */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    transition: 0.3s;
}

.card:hover img {
    transform: scale(1.05);
}

/* 📄 contenido */
.card-content {
    padding: 20px;
    text-align: center;
}

.card-content h3 {
    margin-bottom: 10px;
}

.ver {
    color: #498051;
    font-weight: bold;
}

/* 🔔 toast (por si lo usa en otras páginas) */
#toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #498051;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(-20px);
    transition: 0.4s;
}

/* footer */
footer { background:#111; color:white; padding:15px; text-align:center; }
</style>
</head>

<body>

<header>
<h1>Rocco's Pet Shop</h1>
</header>

<nav>
<a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
<a href="productos.html"><i class="fa-solid fa-box"></i> Productos</a>
<a href="favoritos.html"><i class="fa-solid fa-heart"></i> Favoritos</a>
<a href="contacto.html"><i class="fa-solid fa-user"></i> Contacto</a>

<a href="carrito.html" class="carrito-icono">
<i class="fa-solid fa-cart-shopping"></i>
<span id="contadorCarrito">0</span>
</a>
</nav>

<!-- 🧱 CATEGORÍAS -->
<div class="grid">

<!-- COMIDA -->
<a href="comida.html" class="card-link">
<div class="card">
<img src="Banner-Productos-Purina_Mesa-de-trabajo-1-copia-002-1024x512.jpg">
<div class="card-content">
<h3>Comida</h3>
<p class="ver">Ver productos</p>
</div>
</div>
</a>

<!-- JUGUETES -->
<a href="juguetes.html" class="card-link">
<div class="card">
<img src="pet-care-concept-various-pet-accessories-and-tools-on-blue-background-flat-lay-photo.jpg">
<div class="card-content">
<h3>Juguetes</h3>
<p class="ver">Ver productos</p>
</div>
</div>
</a>

<!-- CAMAS -->
<a href="camas.html" class="card-link">
<div class="card">
<img src="cama-de-verano-para-perros.jpg">
<div class="card-content">
<h3>Camas</h3>
<p class="ver">Ver productos</p>
</div>
</div>
</a>

</div>

<footer>© 2026 Rocco's Pet Shop</footer>

<script>
function actualizarContador(){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
document.getElementById("contadorCarrito").textContent=carrito.length;
}

document.addEventListener("DOMContentLoaded",actualizarContador);
</script>

</body>
</html>
