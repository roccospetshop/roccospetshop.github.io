<!DOCTYPE html>
<html> 
<head> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Carrito - Rocco's Pet Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:#f0f2f5; }

header { background:#498051; padding:30px; text-align:center; color:white; }

nav { background:#222; padding:12px; text-align:center; }

nav a { color:white; margin:0 15px; text-decoration:none; }
nav a:hover { color:#498051; }

/* carrito icono */
.carrito-icono { position: relative; }

#contadorCarrito {
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

/* lista */
.lista {
padding:30px;
max-width:800px;
margin:auto;
}

.item {
display:flex;
align-items:center;
background:white;
margin:10px 0;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.item img {
width:60px;
height:60px;
object-fit:cover;
border-radius:8px;
margin-right:10px;
}

.info {
flex:1;
}

.eliminar {
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* total */
.total {
text-align:center;
font-size:20px;
margin:20px;
font-weight:bold;
}

/* botón pedido */
.btn-pedido {
display:block;
margin:20px auto;
background:#498051;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

/* vacío */
.vacio {
text-align:center;
margin-top:40px;
font-size:18px;
}

/* footer */
footer { background:#111; color:white; padding:15px; text-align:center; }
</style>
</head>

<body>

<header>
<h1>🛒 Mi Carrito</h1>
</header>

<nav>
<a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
<a href="productos.html"><i class="fa-solid fa-box"></i> Productos</a>
<a href="favoritos.html"><i class="fa-solid fa-heart"></i> Favoritos</a>
<a href="contacto.html"><i class="fa-solid fa-user"></i> Contacto</a>

<a href="carrito.html" class="carrito-icono">
<i class="fa-solid fa-cart-shopping"></i>
<span id="contadorCarrito">0</span>
</a>
</nav>

<div class="lista" id="listaCarrito"></div>

<div class="vacio" id="mensaje"></div>

<div class="total" id="total"></div>

<button class="btn-pedido" onclick="realizarPedido()">Realizar pedido</button>

<footer>© 2026 Rocco's Pet Shop</footer>

<script>
function actualizarContador(){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
document.getElementById("contadorCarrito").textContent=carrito.length;
}

let lista=document.getElementById("listaCarrito");
let totalDiv=document.getElementById("total");
let mensaje=document.getElementById("mensaje");

let carrito=JSON.parse(localStorage.getItem("carrito"))||[];

function render(){
lista.innerHTML="";
let total=0;

if(carrito.length===0){
mensaje.textContent="Tu carrito está vacío 🛒";
totalDiv.textContent="";
return;
}else{
mensaje.textContent="";
}

carrito.forEach((p,i)=>{
total+=p.precio;

lista.innerHTML+=`
<div class="item">
<img src="${p.imagen}">
<div class="info">
<strong>${p.nombre}</strong><br>
$${p.precio} MXN
</div>

<button class="eliminar" onclick="eliminar(${i})">
<i class="fa-solid fa-trash"></i>
</button>
</div>
`;
});

totalDiv.textContent="Total: $"+total+" MXN";
}

function eliminar(i){
carrito.splice(i,1);
localStorage.setItem("carrito",JSON.stringify(carrito));
actualizarContador();
render();
}

function realizarPedido(){
if(carrito.length===0){
alert("Tu carrito está vacío");
return;
}

alert("Pedido realizado 🎉");
localStorage.removeItem("carrito");
actualizarContador();
render();
}

document.addEventListener("DOMContentLoaded",()=>{
actualizarContador();
render();
});
</script>

</body>
</html>
