<!DOCTYPE html>
<html>
<head>
<title>Carrito</title>
<style>
body{font-family:Poppins;background:#f0f2f5;}

.lista{padding:30px;}

.item{
display:flex;
align-items:center;
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.item img{
width:50px;
height:50px;
object-fit:cover;
border-radius:8px;
margin-right:10px;
}

.total{
text-align:center;
font-size:20px;
margin:20px;
}

button{
background:#498051;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.eliminar{
background:red;
margin-left:auto;
}
</style>
</head>

<body>

<h1 style="text-align:center;">🛒 Mi carrito</h1>

<div class="lista" id="listaCarrito"></div>

<div class="total" id="total"></div>

<div style="text-align:center;">
<button onclick="realizarPedido()">Realizar pedido</button>
</div>

<script>
let lista=document.getElementById("listaCarrito");
let totalDiv=document.getElementById("total");

let carrito=JSON.parse(localStorage.getItem("carrito"))||[];

function render(){
lista.innerHTML="";
let total=0;

carrito.forEach((p,i)=>{
total+=p.precio;

lista.innerHTML+=`
<div class="item">
<img src="${p.imagen}">
<span>${p.nombre} - $${p.precio}</span>
<button class="eliminar" onclick="eliminar(${i})">X</button>
</div>
`;
});

totalDiv.textContent="Total: $"+total+" MXN";
}

function eliminar(i){
carrito.splice(i,1);
localStorage.setItem("carrito",JSON.stringify(carrito));
render();
}

function realizarPedido(){
alert("Pedido realizado 🎉");
localStorage.removeItem("carrito");
render();
}

render();
</script>

</body>
</html>
