<!DOCTYPE html>
<html> 
<head> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Carrito - Rocco's Pet Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:#f0f2f5; }

header { background:#498051; padding:30px; text-align:center; color:white; }

nav { background:#222; padding:12px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; }
nav a:hover { color:#498051; }

.carrito-icono { position: relative; }
#contadorCarrito {
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

.lista { padding:30px; max-width:800px; margin:auto; }

.item {
display:flex;
align-items:center;
background:white;
margin:10px 0;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.item img {
width:60px;
height:60px;
object-fit:cover;
border-radius:8px;
margin-right:10px;
}

.info { flex:1; }

.eliminar {
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.total {
text-align:center;
font-size:20px;
margin:20px;
font-weight:bold;
}

.formulario {
max-width:400px;
margin:20px auto;
text-align:center;
}

.formulario input {
width:90%;
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

.btn-pedido {
display:block;
margin:20px auto;
background:#498051;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.vacio {
text-align:center;
margin-top:40px;
font-size:18px;
}

footer { background:#111; color:white; padding:15px; text-align:center; }

/* pantalla final */
.final {
display:none;
text-align:center;
padding:80px;
}

.final h2 {
color:#498051;
font-size:28px;
}
</style>
</head>

<body>

<header>
<h1>🛒 Mi Carrito</h1>
</header>

<nav>
<a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
<a href="productos.html"><i class="fa-solid fa-box"></i> Productos</a>
<a href="favoritos.html"><i class="fa-solid fa-heart"></i> Favoritos</a>
<a href="contacto.html"><i class="fa-solid fa-user"></i> Contacto</a>

<a href="carrito.html" class="carrito-icono">
<i class="fa-solid fa-cart-shopping"></i>
<span id="contadorCarrito">0</span>
</a>
</nav>

<!-- CARRITO -->
<div id="contenidoCarrito">

<div class="lista" id="listaCarrito"></div>
<div class="vacio" id="mensaje"></div>
<div class="total" id="total"></div>

<div class="formulario">
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección de entrega">
</div>

<button class="btn-pedido" onclick="realizarPedido()">Realizar pedido</button>

</div>

<!-- PANTALLA FINAL -->
<div class="final" id="pantallaFinal">
<h2>✅ ¡Gracias por tu compra!</h2>
<p>Tu pedido ha sido registrado correctamente</p>
<p>Redirigiendo al inicio...</p>
</div>

<footer>© 2026 Rocco's Pet Shop</footer>

<script>
function actualizarContador(){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
document.getElementById("contadorCarrito").textContent=carrito.length;
}

let lista=document.getElementById("listaCarrito");
let totalDiv=document.getElementById("total");
let mensaje=document.getElementById("mensaje");

let carrito=JSON.parse(localStorage.getItem("carrito"))||[];

function render(){
lista.innerHTML="";
let total=0;

if(carrito.length===0){
mensaje.textContent="Tu carrito está vacío 🛒";
totalDiv.textContent="";
return;
}else{
mensaje.textContent="";
}

carrito.forEach((p,i)=>{
total+=p.precio;

lista.innerHTML+=`
<div class="item">
<img src="${p.imagen}">
<div class="info">
<strong>${p.nombre}</strong><br>
$${p.precio} MXN
</div>

<button class="eliminar" onclick="eliminar(${i})">
<i class="fa-solid fa-trash"></i>
</button>
</div>
`;
});

totalDiv.textContent="Total: $"+total+" MXN";
}

function eliminar(i){
carrito.splice(i,1);
localStorage.setItem("carrito",JSON.stringify(carrito));
actualizarContador();
render();
}

async function realizarPedido(){
let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let direccion=document.getElementById("direccion").value;

if(!nombre || !telefono || !direccion){
mostrarToast("Completa todos los datos ❗");
return;
}

if(carrito.length===0){
mostrarToast("Tu carrito está vacío 🛒");
return;
}

let productosTexto="";
carrito.forEach(p=>{
productosTexto+=`${p.nombre} ($${p.precio}), `;
});

let total=carrito.reduce((sum,p)=>sum+p.precio,0);

let url="https://script.google.com/macros/s/AKfycbzxUXIPPf3GLzy_vly4vNI_UjdTtYDx7BwCVCpS1Bv81FqKUOrHVszlCT2GOjHi9FxlrQ/exec";

try{
await fetch(url,{
method:"POST",
body:JSON.stringify({
nombre,
telefono,
direccion,
productos:productosTexto,
total
})
});

// limpiar carrito
localStorage.removeItem("carrito");
carrito=[];

actualizarContador();
render();

// ocultar carrito y mostrar pantalla final
document.getElementById("contenidoCarrito").style.display="none";
document.getElementById("pantallaFinal").style.display="block";

mostrarToast("Pedido enviado 🎉");

// redirección automática
setTimeout(()=>{
window.location.href="/";
},4000);

}catch(error){
mostrarToast("Error al enviar ❌");
console.log(error);
}
}

function mostrarToast(texto){
let toast=document.createElement("div");

toast.textContent=texto;
toast.style.position="fixed";
toast.style.bottom="20px";
toast.style.left="50%";
toast.style.transform="translateX(-50%)";
toast.style.background="#498051";
toast.style.color="white";
toast.style.padding="12px 20px";
toast.style.borderRadius="10px";
toast.style.boxShadow="0 4px 10px rgba(0,0,0,0.2)";
toast.style.zIndex="999";

document.body.appendChild(toast);

setTimeout(()=>{
toast.remove();
},3000);
}

document.addEventListener("DOMContentLoaded",()=>{
actualizarContador();
render();
});
</script>

</body>
</html>
