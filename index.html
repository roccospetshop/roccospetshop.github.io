<!DOCTYPE html>
<html>
<head>
    <title>Rocco's Pet Shop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f5f5f5;
        }

        header {
            background-color: #ff9900;
            padding: 20px;
            text-align: center;
            color: white;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 20px;
            text-align: center;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            width: 200px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>🐾 Rocco's Pet Shop</h1>
    <p>Todo para tus mascotas</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Contacto</a>
</nav>

<section>
    <h2>Productos destacados</h2>

    <div class="card">
        <h3>Alimento para perros</h3>
        <p>$200 MXN</p>
    </div>

    <div class="card">
        <h3>Juguete para gatos</h3>
        <p>$80 MXN</p>
    </div>

    <div class="card">
        <h3>Pecera pequeña</h3>
        <p>$500 MXN</p>
    </div>
</section>

<footer>
    <p>© 2026 Rocco's Pet Shop</p>
</footer>

</body>
</html>
