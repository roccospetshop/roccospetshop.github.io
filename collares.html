<!DOCTYPE html>
<html> 
<head> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Collares - Rocco's Pet Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:#f0f2f5; }
header { background:#498051; padding:30px; text-align:center; color:white; }
nav { background:#222; padding:12px; text-align:center; }

nav a { color:white; margin:0 15px; text-decoration:none; }
nav a:hover { color:#498051; }

.carrito-icono { position: relative; }

#contadorCarrito {
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.card {
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover { transform: translateY(-5px); }

.card img {
width:100%;
height:180px;
object-fit:cover;
}

.card-content {
padding:15px;
text-align:center;
}

.price { font-weight:bold; margin:10px 0; }

.btn {
background:#498051;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.fav-btn {
background:none;
border:none;
color:#ccc;
font-size:18px;
cursor:pointer;
}

.fav-btn.activo { color:red; }

/* animación carrito */
@keyframes rebote {
0%{transform:scale(1);}
30%{transform:scale(1.3);}
60%{transform:scale(0.9);}
100%{transform:scale(1);}
}

.animar-carrito { animation: rebote 0.4s; }

/* toast */
#toast {
position:fixed;
top:20px;
right:20px;
background:#498051;
color:white;
padding:12px 20px;
border-radius:10px;
opacity:0;
transform:translateY(-20px);
transition:0.4s;
}

#toast.mostrar {
opacity:1;
transform:translateY(0);
}

footer { background:#111; color:white; padding:15px; text-align:center; }
</style>
</head>

<body>

<header><h1>Collares para mascotas</h1></header>

<nav>
<a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
<a href="productos.html"><i class="fa-solid fa-box"></i> Productos</a>
<a href="favoritos.html"><i class="fa-solid fa-heart"></i> Favoritos</a>
<a href="contacto.html"><i class="fa-solid fa-user"></i> Contacto</a>

<a href="carrito.html" class="carrito-icono">
<i class="fa-solid fa-cart-shopping"></i>
<span id="contadorCarrito">0</span>
</a>
</nav>

<div class="grid">

<div class="card">
<img src="collar.jpg">
<div class="card-content">
<h3>Collar básico</h3>
<p class="price">$150 MXN</p>

<button class="btn" onclick="agregarCarrito('Collar básico',150)">Comprar</button>

<button class="fav-btn" onclick="toggleFavorito(this,'Collar básico',150)">
<i class="fa-solid fa-heart"></i>
</button>
</div>
</div>

<div class="card">
<img src="collar.jpg">
<div class="card-content">
<h3>Collar premium</h3>
<p class="price">$300 MXN</p>

<button class="btn" onclick="agregarCarrito('Collar premium',300)">Comprar</button>

<button class="fav-btn" onclick="toggleFavorito(this,'Collar premium',300)">
<i class="fa-solid fa-heart"></i>
</button>
</div>
</div>

</div>

<footer>© 2026 Rocco's Pet Shop</footer>

<div id="toast"></div>

<script>
function actualizarContador(){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
document.getElementById("contadorCarrito").textContent=carrito.length;
}

function mostrarToast(msg){
let t=document.getElementById("toast");
t.textContent=msg;
t.classList.add("mostrar");
setTimeout(()=>t.classList.remove("mostrar"),2000);
}

function animarCarrito(){
let i=document.querySelector(".carrito-icono");
if(i){
i.classList.add("animar-carrito");
setTimeout(()=>i.classList.remove("animar-carrito"),400);
}
}

function agregarCarrito(nombre,precio){
let c=JSON.parse(localStorage.getItem("carrito"))||[];
c.push({nombre,precio});
localStorage.setItem("carrito",JSON.stringify(c));
actualizarContador();
mostrarToast(nombre+" agregado 🛒");
animarCarrito();
}

function toggleFavorito(btn,nombre,precio){
let f=JSON.parse(localStorage.getItem("favoritos"))||[];
let i=f.findIndex(p=>p.nombre===nombre);

if(i>-1){
f.splice(i,1);
btn.classList.remove("activo");
}else{
f.push({nombre,precio});
btn.classList.add("activo");
}

localStorage.setItem("favoritos",JSON.stringify(f));
}

document.addEventListener("DOMContentLoaded",actualizarContador);
</script>

</body>
</html>
