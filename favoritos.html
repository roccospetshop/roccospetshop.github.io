<!DOCTYPE html>
<html> 
<head> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Favoritos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#f0f2f5;}

header{background:#498051;color:white;padding:30px;text-align:center;}

nav{background:#222;padding:12px;text-align:center;}
nav a{color:white;margin:0 15px;text-decoration:none;}
nav a:hover{color:#498051;}

.carrito-icono{position:relative;}
#contadorCarrito{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
padding:15px;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.btn{
background:#498051;
color:white;
border:none;
padding:8px;
border-radius:8px;
margin:5px;
cursor:pointer;
}

.eliminar{background:red;}

footer{background:#111;color:white;text-align:center;padding:15px;}
</style>
</head>

<body>

<header><h1>❤️ Favoritos</h1></header>

<nav>
<a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
<a href="productos.html"><i class="fa-solid fa-box"></i> Productos</a>
<a href="favoritos.html"><i class="fa-solid fa-heart"></i> Favoritos</a>
<a href="contacto.html"><i class="fa-solid fa-user"></i> Contacto</a>

<a href="carrito.html" class="carrito-icono">
<i class="fa-solid fa-cart-shopping"></i>
<span id="contadorCarrito">0</span>
</a>
</nav>

<div class="grid" id="lista"></div>

<footer>© 2026 Rocco's Pet Shop</footer>

<script>
function actualizarContador(){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
document.getElementById("contadorCarrito").textContent=carrito.length;
}

let lista=document.getElementById("lista");
let favoritos=JSON.parse(localStorage.getItem("favoritos"))||[];

function render(){
lista.innerHTML="";

favoritos.forEach((p,i)=>{
lista.innerHTML+=`
<div class="card">
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p>$${p.precio}</p>

<button class="btn" onclick="agregarCarrito('${p.nombre}',${p.precio},'${p.imagen}')">Carrito</button>

<button class="btn eliminar" onclick="eliminar(${i})">Eliminar</button>
</div>
`;
});
}

function eliminar(i){
favoritos.splice(i,1);
localStorage.setItem("favoritos",JSON.stringify(favoritos));
render();
}

function agregarCarrito(n,p,img){
let c=JSON.parse(localStorage.getItem("carrito"))||[];
c.push({nombre:n,precio:p,imagen:img});
localStorage.setItem("carrito",JSON.stringify(c));
actualizarContador();
}

document.addEventListener("DOMContentLoaded",()=>{
actualizarContador();
render();
});
</script>

</body>
</html>
