<!DOCTYPE html>
<html> 
<head> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Favoritos - Rocco's Pet Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:#f0f2f5; }

header { background:#498051; padding:30px; text-align:center; color:white; }

nav { background:#222; padding:12px; text-align:center; }

nav a { color:white; margin:0 15px; text-decoration:none; }
nav a:hover { color:#498051; }

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.card {
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
padding-bottom:15px;
}

.card img {
width:100%;
height:160px;
object-fit:cover;
}

.price { font-weight:bold; }

.btn {
background:#498051;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.eliminar {
background:red;
}

.vacio {
text-align:center;
margin:40px;
font-size:18px;
}

footer { background:#111; color:white; padding:15px; text-align:center; }
</style>
</head>

<body>

<header><h1>❤️ Favoritos</h1></header>

<nav>
<a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
<a href="productos.html">Productos</a>
<a href="carrito.html">Carrito</a>
</nav>

<div class="grid" id="listaFavoritos"></div>

<div class="vacio" id="mensaje"></div>

<footer>© 2026 Rocco's Pet Shop</footer>

<script>
let contenedor=document.getElementById("listaFavoritos");
let mensaje=document.getElementById("mensaje");

let favoritos=JSON.parse(localStorage.getItem("favoritos"))||[];

function render(){
contenedor.innerHTML="";

if(favoritos.length===0){
mensaje.textContent="No hay favoritos aún ❤️";
return;
}

mensaje.textContent="";

favoritos.forEach((p,i)=>{
contenedor.innerHTML+=`
<div class="card">
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p class="price">$${p.precio} MXN</p>

<button class="btn" onclick="agregarCarrito('${p.nombre}',${p.precio},'${p.imagen}')">Agregar al carrito</button>

<button class="btn eliminar" onclick="eliminar(${i})">Eliminar</button>
</div>
`;
});
}

function eliminar(i){
favoritos.splice(i,1);
localStorage.setItem("favoritos",JSON.stringify(favoritos));
render();
}

function agregarCarrito(nombre,precio,imagen){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
carrito.push({nombre,precio,imagen});
localStorage.setItem("carrito",JSON.stringify(carrito));
alert("Agregado al carrito 🛒");
}

render();
</script>

</body>
</html>
