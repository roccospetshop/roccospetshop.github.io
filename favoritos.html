<!DOCTYPE html>
<html>
<head>
<title>Favoritos</title>
<style>
body{font-family:Poppins;background:#f0f2f5;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:40px;}

.card{background:white;padding:15px;border-radius:10px;text-align:center;}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}
</style>
</head>

<body>

<h1 style="text-align:center;">❤️ Favoritos</h1>

<div class="grid" id="listaFavoritos"></div>

<script>
let lista=document.getElementById("listaFavoritos");
let favoritos=JSON.parse(localStorage.getItem("favoritos"))||[];

favoritos.forEach(p=>{
lista.innerHTML+=`
<div class="card">
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p>$${p.precio}</p>
</div>
`;
});
</script>

</body>
</html>
