<!DOCTYPE html>
<html> 
<head> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Camas - Rocco's Pet Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
/* MISMO CSS (igual que juguetes) */
body { margin:0; font-family:'Poppins'; background:#f0f2f5; }
header { background:#498051; padding:30px; text-align:center; color:white; }
nav { background:#222; padding:12px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; }
nav a:hover { color:#498051; }

.carrito-icono { position: relative; }
#contadorCarrito {
position:absolute; top:-8px; right:-10px;
background:red; color:white; font-size:12px;
padding:3px 6px; border-radius:50%;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.card {
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover { transform: translateY(-5px); }

.card img {
width:100%;
height:180px;
object-fit:cover;
}

.card-content {
padding:15px;
text-align:center;
}

.price { font-weight:bold; margin:10px 0; }

.btn {
background:#498051;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.fav-btn {
background:none;
border:none;
color:#ccc;
font-size:18px;
cursor:pointer;
}

.fav-btn.activo { color:red; }

footer { background:#111; color:white; padding:15px; text-align:center; }
</style>
</head>

<body>

<header><h1>Camas para mascotas</h1></header>

<nav>
<a href="/"><i class="fa-solid fa-house"></i> Inicio</a>
<a href="productos.html"><i class="fa-solid fa-box"></i> Productos</a>
<a href="favoritos.html"><i class="fa-solid fa-heart"></i> Favoritos</a>
<a href="contacto.html"><i class="fa-solid fa-user"></i> Contacto</a>

<a href="carrito.html" class="carrito-icono">
<i class="fa-solid fa-cart-shopping"></i>
<span id="contadorCarrito">0</span>
</a>
</nav>

<div class="grid">

<div class="card">
<img src="cama-de-verano-para-perros.jpg">
<div class="card-content">
<h3>Cama básica</h3>
<p class="price">$600 MXN</p>
<button class="btn" onclick="agregarCarrito('Cama básica',600)">Comprar</button>
<button class="fav-btn" onclick="toggleFavorito(this,'Cama básica',600)">
<i class="fa-solid fa-heart"></i>
</button>
</div>
</div>

</div>

<footer>© 2026 Rocco's Pet Shop</footer>

<script>
function actualizarContador(){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
document.getElementById("contadorCarrito").textContent=carrito.length;
}

function agregarCarrito(nombre,precio){
let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
carrito.push({nombre,precio});
localStorage.setItem("carrito",JSON.stringify(carrito));
actualizarContador();
}

function toggleFavorito(boton,nombre,precio){
let favoritos=JSON.parse(localStorage.getItem("favoritos"))||[];
favoritos.push({nombre,precio});
localStorage.setItem("favoritos",JSON.stringify(favoritos));
boton.classList.add("activo");
}

document.addEventListener("DOMContentLoaded",actualizarContador);
</script>

</body>
</html>
